<!DOCTYPE html>
<!-- Define o documento como HTML5 -->

<html lang="pt-BR">
<!-- Define o idioma da página como português do Brasil -->

<head>
  <meta charset="UTF-8">
  <!-- Permite uso de acentos e caracteres especiais -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Faz o site ser responsivo em dispositivos móveis -->

  <title>Contato - Anny Memorias</title>
  <!-- Título que aparece na aba do navegador -->

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Importa o Tailwind CSS via CDN para estilização rápida -->

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <!-- Biblioteca para envio de e-mails direto do front-end -->

  <script>
    (function(){
      emailjs.init("SUA_PUBLIC_KEY");
      // Inicializa o EmailJS com sua chave pública (necessário para enviar e-mails)
    })();
  </script>
</head>

<body class="bg-neutral-100">
<!-- Define um fundo cinza claro usando Tailwind -->

<section 
  id="formContainer"
  class="p-6 max-w-xl mx-auto bg-white mt-10 rounded-2xl shadow opacity-0 translate-y-10 transition-all duration-700"
>
  <!-- Container do formulário:
       p-6 = padding
       max-w-xl = largura máxima
       mx-auto = centraliza
       bg-white = fundo branco
       mt-10 = margem no topo
       rounded-2xl = bordas arredondadas
       shadow = sombra
       opacity-0 + translate-y-10 = usado para animação inicial
       transition-all duration-700 = animação suave -->

  <h1 class="text-2xl font-bold mb-4 text-center">
    📩 Fale Conosco
  </h1>
  <!-- Título do formulário -->

  <!-- FORMULÁRIO -->
  <form id="formContato" class="flex flex-col gap-4">
  <!-- Formulário com layout vertical e espaçamento entre elementos -->

    <input 
      type="text" 
      name="nome" 
      placeholder="Seu nome" 
      required 
      class="p-3 border rounded"
    >
    <!-- Campo para nome (obrigatório) -->

    <input 
      type="email" 
      name="email" 
      placeholder="Seu e-mail" 
      required 
      class="p-3 border rounded"
    >
    <!-- Campo de e-mail com validação automática do HTML -->

    <select name="produto" required class="p-3 border rounded">
      <!-- Campo de seleção de produto (obrigatório) -->
      <option value="">Selecione um produto</option>
      <option value="picole_pudim">Picolé de Pudim</option>
      <option value="pudim_copo">Pudim de Copo</option>
    </select>

    <input 
      type="number" 
      name="quantidade" 
      placeholder="Quantidade" 
      min="1"
      required 
      class="p-3 border rounded"
    >
    <!-- Campo numérico para quantidade (mínimo 1) -->

    <textarea 
      name="observacao" 
      placeholder="Observações (ex: entrega, horário...)" 
      class="p-3 border rounded h-24"
    ></textarea>
    <!-- Campo para observações adicionais -->

    <textarea 
      name="mensagem" 
      placeholder="Mensagem adicional"
      class="p-3 border rounded h-32"
    ></textarea>
    <!-- Campo para mensagem livre -->

    <input type="text" name="_gotcha" style="display:none">
    <!-- Campo oculto anti-spam (honeypot):
         bots costumam preencher, humanos não -->

    <button 
      id="btnEnviar"
      type="submit"
      class="bg-black text-white py-3 rounded hover:bg-gray-800 transition"
    >
      Enviar pedido
    </button>
    <!-- Botão de envio com efeito hover -->

  </form>

  <p id="statusMsg" class="text-center mt-4 hidden"></p>
  <!-- Área para mostrar mensagens (sucesso/erro) dinamicamente -->

  <a href="index.html" class="block text-center mt-4 underline">
    ← Voltar
  </a>
  <!-- Link para voltar à página inicial -->

</section>

<script src="script.js"></script>
<!-- Arquivo JS externo (provavelmente controla envio do formulário e animações) -->

</body>
</html>
